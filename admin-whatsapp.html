<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central de Conversas WhatsApp | MacTec Support</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="/css/admin-whatsapp.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/app-config.js"></script>
  <script src="/js/admin-whatsapp-api.js" defer></script>
  <script src="/js/admin-whatsapp.js" defer></script>
</head>
<body>
  <div class="wa-page">
    <header class="wa-header">
      <div class="wa-header-title">
        <span aria-hidden="true">💬</span>
        <span>Central de Conversas WhatsApp</span>
      </div>
      <div class="wa-header-actions">
        <button id="waBackToAdminBtn" class="wa-btn wa-btn-secondary" type="button">Voltar ao Painel</button>
        <button id="waGoHomeBtn" class="wa-btn wa-btn-secondary" type="button">Home</button>
        <button id="waLogoutBtn" class="wa-btn wa-btn-secondary" type="button">Sair</button>
      </div>
    </header>

    <main class="wa-shell">
      <aside class="wa-product-nav" aria-label="Navegação principal">
        <div class="wa-product-brand">
          <span class="wa-product-brand-logo" aria-hidden="true">🛠️</span>
          <div>
            <strong>MacTec</strong>
            <span>Support Suite</span>
          </div>
        </div>

        <nav class="wa-product-menu">
          <button class="wa-product-menu-item active" data-product-area="conversations" type="button"><span>💬</span><span>Conversas</span></button>
          <button class="wa-product-menu-item" data-product-area="kanban" type="button"><span>🧩</span><span>Kanban</span></button>
          <button class="wa-product-menu-item" data-product-area="contatos" type="button"><span>👥</span><span>Contatos</span></button>
          <button class="wa-product-menu-item" data-product-area="etiquetas" type="button"><span>🏷️</span><span>Etiquetas</span></button>
          <button class="wa-product-menu-item" data-product-area="tarefas" type="button"><span>✅</span><span>Tarefas</span></button>
          <button class="wa-product-menu-item" data-product-area="lembretes" type="button"><span>⏰</span><span>Lembretes</span></button>
          <button class="wa-product-menu-item" data-product-area="relatorios" type="button"><span>📊</span><span>Relatórios</span></button>
          <button class="wa-product-menu-item" data-product-area="automacao" type="button"><span>⚙️</span><span>Automação</span></button>
          <button class="wa-product-menu-item" data-product-area="configuracoes" type="button"><span>🔧</span><span>Configurações</span></button>
          <button class="wa-product-menu-item" data-product-area="ajuda" type="button"><span>❓</span><span>Ajuda</span></button>
        </nav>
      </aside>

      <aside class="wa-sidebar">
        <div class="wa-sidebar-top">
          <div class="wa-search-row">
            <input id="waSearchInput" class="wa-search-input" type="text" placeholder="Buscar por nome ou telefone" />
            <button class="wa-filter-icon" type="button" aria-label="Filtros">☰</button>
          </div>
          <div class="wa-filter-tabs">
            <button class="wa-filter-tab active" data-filter="all" type="button">Todas</button>
            <button class="wa-filter-tab" data-filter="unread" type="button">Não lidas</button>
            <button class="wa-filter-tab" data-filter="waiting" type="button">Aguardando</button>
          </div>
        </div>

        <div id="waConversationList" class="wa-conversation-list"></div>

        <footer class="wa-sidebar-footer">
          <span id="waTotalConversations">0 conversas</span>
          <span id="waUpdatedAt">Atualizado agora</span>
        </footer>
      </aside>

      <section class="wa-workspace" data-workspace-focus="conversations">
        <div class="wa-workspace-head">
          <div class="wa-view-switch" role="tablist" aria-label="Alternar foco do módulo">
            <button id="waViewConversationsBtn" class="wa-view-tab active" data-view-mode="conversations" type="button">Atendimento</button>
            <button id="waViewKanbanBtn" class="wa-view-tab" data-view-mode="kanban" type="button">CRM / Kanban</button>
          </div>
          <div class="wa-placeholder-strip" aria-label="Módulos auxiliares preparados">
            <span>Contatos</span>
            <span>Etiquetas</span>
            <span>Tarefas</span>
            <span>Lembretes</span>
            <span>Relatórios</span>
          </div>
        </div>

        <div class="wa-workspace-grid">
          <section id="waConversationsView" class="wa-view-panel wa-view-panel-conversations">
            <div id="waChatHeader" class="wa-chat-header"></div>
            <div id="waConversationContextPanel" class="wa-conversation-context-panel"></div>
            <div id="waMessageHistory" class="wa-message-history"></div>

            <div class="wa-reply-box">
              <div class="wa-reply-toolbar">📎 😊</div>
              <div class="wa-reply-row">
                <textarea id="waReplyInput" class="wa-reply-textarea" placeholder="Digite a resposta manual..."></textarea>
                <button id="waSendReplyBtn" class="wa-btn wa-btn-primary" type="button">Enviar</button>
              </div>
              <div id="waPageStatus" class="wa-page-status" data-type="info"></div>
            </div>
          </section>

          <section id="waKanbanView" class="wa-view-panel wa-view-panel-kanban">
            <div class="wa-kanban-panel-head">
              <strong>Pipeline CRM</strong>
              <small>Conversas e estágio comercial coexistem nesta visão</small>
            </div>
            <div id="waKanbanBoard" class="wa-kanban-board"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (typeof window.initAdminWhatsAppPage === 'function') {
        window.initAdminWhatsAppPage();
      }
    });
  </script>
</body>
</html>
