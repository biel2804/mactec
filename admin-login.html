<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacTec • Login Admin</title>
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/app-config.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root[data-theme="dark"] {
      --bg-main: #0b0f1a;
      --bg-secondary: #111827;
      --text-main: #ffffff;
      --text-secondary: #9ca3af;
      --accent: #22c55e;
      --card-bg: rgba(17, 24, 39, 0.78);
      --border: #374151;
      --accent-contrast: #052e16;
      --accent-hover: #16a34a;
      --focus-ring: rgba(34, 197, 94, 0.28);
      --card-shadow: 0 18px 45px rgba(2, 6, 23, 0.45);
      --field-bg: rgba(31, 41, 55, 0.7);
    }

    :root[data-theme="light"] {
      --bg-main: #F8F9FA;
      --bg-secondary: #E7F1FF;
      --text-main: #111827;
      --text-secondary: #4b5563;
      --accent: #001F3F;
      --card-bg: rgba(255, 255, 255, 0.82);
      --border: #d1d5db;
      --accent-contrast: #ffffff;
      --accent-hover: #001735;
      --focus-ring: rgba(0, 31, 63, 0.22);
      --card-shadow: 0 20px 42px rgba(15, 23, 42, 0.14);
      --field-bg: rgba(248, 250, 252, 0.92);
    }

    :root {
      --radius-card: 18px;
      --radius-input: 12px;
    }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text-main);
      background: radial-gradient(circle at 20% 15%, color-mix(in srgb, var(--bg-secondary) 70%, transparent), transparent 45%), linear-gradient(160deg, var(--bg-main), var(--bg-secondary));
      display: grid;
      place-items: center;
      padding: 1rem;
      transition: background 0.35s ease, color 0.3s ease;
    }

    .login-shell {
      width: min(100%, 400px);
    }

    .brand {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 0.95rem;
      user-select: none;
    }

    .brand-logo {
      height: clamp(70px, 18vw, 100px);
      width: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(15, 23, 42, 0.24));
      image-rendering: auto;
    }

    .card {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.6rem 1.6rem 1.35rem;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    h1 {
      margin: 0 0 1.4rem;
      text-align: center;
      color: var(--accent);
      font-size: 2rem;
      line-height: 1.1;
      font-weight: 800;
    }

    .field-group { margin-bottom: 0.95rem; }

    label {
      display: block;
      margin-bottom: 0.42rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: color-mix(in srgb, var(--text-main) 85%, var(--text-secondary));
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-icon {
      position: absolute;
      left: 0.85rem;
      display: inline-flex;
      color: var(--text-secondary);
      pointer-events: none;
    }

    input {
      width: 100%;
      background: var(--field-bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: var(--radius-input);
      min-height: 3rem;
      font-size: 1.05rem;
      padding: 0.78rem 2.9rem 0.78rem 2.55rem;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.3s ease, color 0.3s ease;
    }

    input::placeholder { color: color-mix(in srgb, var(--text-secondary) 90%, transparent); }

    input:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .toggle-password {
      position: absolute;
      right: 0.6rem;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      width: 2rem;
      height: 2rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .toggle-password:hover { background: color-mix(in srgb, var(--border) 60%, transparent); }
    .toggle-password:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .submit-btn {
      width: 100%;
      margin-top: 0.75rem;
      min-height: 3.05rem;
      border: none;
      border-radius: 12px;
      font-size: 1.9rem;
      line-height: 1;
      font-weight: 800;
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 90%, #ffffff 10%), var(--accent));
      color: var(--accent-contrast);
      cursor: pointer;
      box-shadow: 0 8px 22px color-mix(in srgb, var(--accent) 34%, transparent);
      transition: filter 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
    }

    .submit-btn:hover { filter: brightness(1.08); }
    .submit-btn:active { transform: translateY(1px); }
    .submit-btn:disabled { opacity: 0.72; cursor: wait; }

    .msg {
      margin: 0.9rem 0 0;
      font-size: 0.95rem;
      color: var(--text-secondary);
      min-height: 1.2rem;
    }

    .msg.error { color: #ef4444; }
    .msg.info { color: var(--text-secondary); }


    @media (max-width: 520px) {
      .brand-logo { height: clamp(68px, 24vw, 88px); }
      .card { padding: 1.2rem 1.2rem 1.1rem; border-radius: 16px; }
      h1 { font-size: 1.8rem; }
      label { font-size: 1.02rem; }
    }
  </style>
</head>
<body>
  <section class="login-shell" aria-label="Acesso administrativo MacTec">
    <header class="brand">
      <img class="brand-logo" src="/assets/mactec-logo.svg" alt="MacTec" width="320" height="250" fetchpriority="high" decoding="async" />
    </header>

    <main class="card">
      <h1>Acesso Admin</h1>
      <form id="adminLoginForm">
        <div class="field-group">
          <label for="adminIdentifier">Usuário ou Email</label>
          <div class="input-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"/></svg>
            </span>
            <input id="adminIdentifier" type="text" autocomplete="username" placeholder="Seu usuário ou email" required />
          </div>
        </div>

        <div class="field-group">
          <label for="adminPassword">Senha</label>
          <div class="input-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17 9h-1V7a4 4 0 1 0-8 0v2H7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2ZM10 7a2 2 0 1 1 4 0v2h-4Z"/></svg>
            </span>
            <input id="adminPassword" type="password" autocomplete="current-password" placeholder="Sua senha" required />
            <button id="togglePasswordBtn" class="toggle-password" type="button" aria-label="Mostrar senha" aria-pressed="false">
              <svg id="eyeOpenIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5c-5.59 0-10 5.17-10 7s4.41 7 10 7 10-5.17 10-7-4.41-7-10-7Zm0 11a4 4 0 1 1 4-4 4 4 0 0 1-4 4Z"/></svg>
              <svg id="eyeOffIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" hidden><path d="m2.1 3.51 1.41-1.41L21.9 20.49l-1.41 1.41-3.1-3.1A11.7 11.7 0 0 1 12 20c-5.59 0-10-5.17-10-7a8.8 8.8 0 0 1 3.22-4.8L2.1 3.51ZM12 8a4 4 0 0 1 4 4 3.87 3.87 0 0 1-.36 1.64l-5.28-5.28A3.87 3.87 0 0 1 12 8Zm10-1c0 .95-1.27 2.82-3.33 4.29l-1.46-1.46A8.88 8.88 0 0 0 20 7s-3.17-4-8-4a7.79 7.79 0 0 0-2.94.58L7.45 1.97A10.92 10.92 0 0 1 12 1c5.59 0 10 5.17 10 7Z"/></svg>
            </button>
          </div>
        </div>

        <button id="submitBtn" class="submit-btn" type="submit">Entrar</button>
        <p id="feedback" class="msg info"></p>
      </form>
    </main>
  </section>

  <script>
    const ADMIN_INACTIVITY_TIMEOUT_MS = 40 * 60 * 1000;
    const ADMIN_LAST_ACTIVITY_KEY = 'admin_last_activity_at';

    const config = window.APP_CONFIG || {};
    const SUPABASE_URL = config.SUPABASE_URL || '';
    const SUPABASE_KEY = config.SUPABASE_KEY || '';
    const params = new URLSearchParams(window.location.search);
    const redirectTo = params.get('redirect') || '/orcamento.html?admin=1';

    function setFeedback(message, type = 'info') {
      const feedback = document.getElementById('feedback');
      feedback.textContent = message;
      feedback.className = `msg ${type}`;
    }

    function touchAdminActivity() {
      localStorage.setItem(ADMIN_LAST_ACTIVITY_KEY, String(Date.now()));
    }

    function isInactivityExpired() {
      const last = Number(localStorage.getItem(ADMIN_LAST_ACTIVITY_KEY) || 0);
      if (!last) return false;
      return (Date.now() - last) > ADMIN_INACTIVITY_TIMEOUT_MS;
    }

    function bindPasswordToggle() {
      const passwordInput = document.getElementById('adminPassword');
      const toggleBtn = document.getElementById('togglePasswordBtn');
      const eyeOpenIcon = document.getElementById('eyeOpenIcon');
      const eyeOffIcon = document.getElementById('eyeOffIcon');

      toggleBtn.addEventListener('click', () => {
        const shouldShow = passwordInput.type === 'password';
        passwordInput.type = shouldShow ? 'text' : 'password';
        toggleBtn.setAttribute('aria-pressed', String(shouldShow));
        toggleBtn.setAttribute('aria-label', shouldShow ? 'Ocultar senha' : 'Mostrar senha');
        eyeOpenIcon.hidden = shouldShow;
        eyeOffIcon.hidden = !shouldShow;
      });
    }

    async function bootstrapLogin() {
      bindPasswordToggle();

      if (!SUPABASE_URL || !SUPABASE_KEY || !window.supabase?.createClient) {
        setFeedback('Configuração de autenticação indisponível. Verifique o app-config.js.', 'error');
        return;
      }

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const { data } = await client.auth.getSession();

      if (data?.session && isInactivityExpired()) {
        await client.auth.signOut();
        localStorage.removeItem(ADMIN_LAST_ACTIVITY_KEY);
      } else if (data?.session) {
        touchAdminActivity();
        window.location.replace(redirectTo);
        return;
      }

      const reason = params.get('reason');
      if (reason === 'expired') {
        setFeedback('Sua sessão expirou por inatividade. Faça login novamente.', 'info');
      } else if (reason === 'logout') {
        setFeedback('Logout realizado com sucesso.', 'info');
      }

      document.getElementById('adminLoginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;

        const identifier = String(document.getElementById('adminIdentifier').value || '').trim();
        const password = String(document.getElementById('adminPassword').value || '');

        if (!identifier || !password) {
          setFeedback('Informe usuário/email e senha.', 'error');
          submitBtn.disabled = false;
          return;
        }

        const { error } = await client.auth.signInWithPassword({
          email: identifier,
          password
        });

        if (error) {
          setFeedback('Login inválido. Verifique usuário/email e senha.', 'error');
          submitBtn.disabled = false;
          return;
        }

        touchAdminActivity();
        setFeedback('Acesso liberado. Redirecionando...', 'info');
        window.location.replace(redirectTo);
      });
    }

    bootstrapLogin();
  </script>
</body>
</html>
