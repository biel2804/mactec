<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 250" role="img" aria-labelledby="title desc">
  <title id="title">Logo MacTec</title>
  <desc id="desc">Marca MacTec com símbolo circular azul e verde e tipografia MacTec.</desc>
  <defs>
    <linearGradient id="blueRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3BA3FF"/>
      <stop offset="1" stop-color="#0059C7"/>
    </linearGradient>
    <linearGradient id="greenRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93E94B"/>
      <stop offset="1" stop-color="#22A144"/>
    </linearGradient>
    <linearGradient id="appleFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9FBFF"/>
      <stop offset="1" stop-color="#B9C0CC"/>
    </linearGradient>
    <linearGradient id="androidFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9FF66C"/>
      <stop offset="1" stop-color="#38B546"/>
    </linearGradient>
    <linearGradient id="waterFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E93FF"/>
      <stop offset="1" stop-color="#0F56B3"/>
    </linearGradient>
    <linearGradient id="macText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0B66C2"/>
      <stop offset="1" stop-color="#125AB0"/>
    </linearGradient>
    <linearGradient id="tecText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#35C36B"/>
      <stop offset="1" stop-color="#147D8C"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.24"/>
    </filter>
  </defs>

  <g transform="translate(20 8)" filter="url(#softShadow)">
    <circle cx="120" cy="80" r="66" fill="none" stroke="url(#blueRing)" stroke-width="13"/>
    <path d="M126 14A66 66 0 0 1 184 70" fill="none" stroke="url(#greenRing)" stroke-width="13" stroke-linecap="round"/>

    <path d="M84 41c0-18 14-30 30-30 9 0 15 3 20 8 7-1 13 2 15 8 2 6-1 13-8 18l-9 6-39 7c-5-4-9-10-9-17Z" fill="url(#appleFill)"/>
    <path d="M127 19c4-11 14-17 24-17-1 10-8 20-20 24-3 1-5 1-8 1 0-2 2-5 4-8Z" fill="url(#appleFill)"/>

    <path d="M120 70h56c10 0 18 8 18 18v17c0 10-8 18-18 18h-56Z" fill="url(#androidFill)"/>
    <circle cx="157" cy="81" r="3.7" fill="#0b3d22"/>
    <path d="M120 86h74" stroke="#106030" stroke-width="4"/>

    <path d="M66 95c10 0 25 6 42 6 18 0 31-7 43-7 18 0 28 10 33 24-9 17-27 27-48 27-13 0-25-4-37-4-11 0-22 4-33 4-16 0-29-9-36-22 4-17 16-28 36-28Z" fill="url(#waterFill)"/>
  </g>

  <text x="160" y="214" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="0.2">
    <tspan fill="url(#macText)">Mac</tspan><tspan fill="url(#tecText)">Tec</tspan>
  </text>
</svg>
